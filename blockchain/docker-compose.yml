version: '3.8'

services:
  bootnode:
    image: ethereum/client-go:v1.13.0
    container_name: stockledger-bootnode
    command: >
      bootnode
      -nodekey /data/bootnode.key
      -addr :30301
      -verbosity 9
    volumes:
      - ./data/bootnode:/data
    ports:
      - "30301:30301"
      - "30301:30301/udp"
    networks:
      - stockledger-net
    restart: unless-stopped

  validator1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockledger-validator1
    command: >
      --datadir /data
      --networkid 1337
      --syncmode full
      --http
      --http.addr 0.0.0.0
      --http.port 8545
      --http.vhosts "*"
      --http.corsdomain "*"
      --ws
      --ws.addr 0.0.0.0
      --ws.port 8546
      --port 30303
      --unlock 0x0000000000000000000000000000000000000001
      --password /data/password.txt
      --mine
      --miner.etherbase 0x0000000000000000000000000000000000000001
      --miner.gaslimit 8000000
      --bootnodes enode://@bootnode:30301
      --allow-insecure-unlock
    volumes:
      - ./validators/validator1:/data
      - ./genesis.json:/app/genesis.json
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303"
      - "30303:30303/udp"
    depends_on:
      - bootnode
    networks:
      - stockledger-net
    restart: unless-stopped

  validator2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockledger-validator2
