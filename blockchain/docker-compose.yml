      --unlock 0x0000000000000000000000000000000000000002
      --password /data/password.txt
      --mine
      --miner.etherbase 0x0000000000000000000000000000000000000002
      --miner.gaslimit 8000000
      --bootnodes enode://@bootnode:30301
      --allow-insecure-unlock
    volumes:
      - ./validators/validator2:/data
      - ./genesis.json:/app/genesis.json
    ports:
      - "8547:8545"
      - "8548:8546"
      - "30304:30304"
      - "30304:30304/udp"
    depends_on:
      - bootnode
    networks:
      - stockledger-net
    restart: unless-stopped

  validator3:
